<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todoアプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .app {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  header {
    background: #2d3748;
    color: #fff;
    padding: 20px 24px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header .count { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .input-row {
    display: flex;
    flex-wrap: wrap;
    padding: 16px;
    gap: 8px;
    border-bottom: 1px solid #edf2f7;
  }
  #new-todo {
    flex: 1 1 100%;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #new-todo:focus { border-color: #667eea; }
  #new-due {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #4a5568;
    outline: none;
    transition: border-color 0.15s;
  }
  #new-due:focus { border-color: #667eea; }
  #new-category {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #4a5568;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #new-category:focus { border-color: #667eea; }
  #add-btn {
    padding: 10px 18px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  #add-btn:hover { background: #5a67d8; }
  .filters {
    display: flex;
    flex-wrap: wrap;
    padding: 12px 16px;
    gap: 8px;
    border-bottom: 1px solid #edf2f7;
  }
  .filter-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    color: #4a5568;
    cursor: pointer;
  }
  .filter-btn.active {
    background: #667eea;
    color: #fff;
    border-color: #667eea;
  }
  .category-filters {
    display: flex;
    flex-wrap: wrap;
    padding: 8px 16px 12px;
    gap: 6px;
    border-bottom: 1px solid #edf2f7;
  }
  .category-filters:empty { display: none; }
  .cat-btn {
    padding: 4px 10px;
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    font-size: 11px;
    color: #4a5568;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .cat-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .cat-btn.active {
    background: #2d3748;
    color: #fff;
    border-color: #2d3748;
  }
  ul { list-style: none; }
  li {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #f7fafc;
    gap: 12px;
  }
  li:last-child { border-bottom: none; }
  li input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #667eea;
  }
  li .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  li .text-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  li .text {
    font-size: 14px;
    color: #2d3748;
    word-break: break-word;
  }
  li .badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  li.done .badge { opacity: 0.5; }
  li .due {
    font-size: 11px;
    color: #718096;
  }
  li .due.overdue {
    color: #e53e3e;
    font-weight: 600;
  }
  li .due.today {
    color: #d69e2e;
    font-weight: 600;
  }
  li.done .text {
    text-decoration: line-through;
    color: #a0aec0;
  }
  li.done .due { color: #cbd5e0; font-weight: normal; }
  li .delete {
    background: transparent;
    border: none;
    color: #cbd5e0;
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
    transition: color 0.15s;
  }
  li .delete:hover { color: #e53e3e; }
  .empty {
    padding: 40px 16px;
    text-align: center;
    color: #a0aec0;
    font-size: 14px;
  }
  .footer {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #edf2f7;
    font-size: 12px;
    color: #718096;
  }
  #clear-completed {
    background: transparent;
    border: none;
    color: #718096;
    cursor: pointer;
    font-size: 12px;
  }
  #clear-completed:hover { color: #e53e3e; }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Todoアプリ</h1>
      <div class="count" id="count">0件</div>
    </header>
    <form class="input-row" id="form">
      <input type="text" id="new-todo" placeholder="やることを入力…" autocomplete="off" autofocus>
      <input type="date" id="new-due" title="期限（任意）">
      <input type="text" id="new-category" placeholder="カテゴリ（任意）" list="category-list" autocomplete="off">
      <datalist id="category-list"></datalist>
      <button type="submit" id="add-btn">追加</button>
    </form>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了</button>
    </div>
    <div class="category-filters" id="category-filters"></div>
    <ul id="list"></ul>
    <div class="footer">
      <span id="remaining">残り 0 件</span>
      <button id="clear-completed">完了済みを削除</button>
    </div>
  </div>

<script>
  const STORAGE_KEY = 'todo-app-items';
  let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let filter = 'all';
  let categoryFilter = '';

  const listEl = document.getElementById('list');
  const formEl = document.getElementById('form');
  const inputEl = document.getElementById('new-todo');
  const dueInputEl = document.getElementById('new-due');
  const categoryInputEl = document.getElementById('new-category');
  const categoryListEl = document.getElementById('category-list');
  const categoryFiltersEl = document.getElementById('category-filters');
  const countEl = document.getElementById('count');
  const remainingEl = document.getElementById('remaining');

  function categoryColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) {
      h = (h * 31 + name.charCodeAt(i)) >>> 0;
    }
    const hue = h % 360;
    return `hsl(${hue}, 65%, 45%)`;
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function formatDue(due) {
    if (!due) return null;
    const today = todayStr();
    const [y, m, d] = due.split('-');
    const label = `${parseInt(m, 10)}/${parseInt(d, 10)}`;
    let cls = '';
    if (due < today) cls = 'overdue';
    else if (due === today) cls = 'today';
    let prefix = '期限: ';
    if (due === today) prefix = '今日: ';
    else if (due < today) {
      const diff = Math.floor((new Date(today) - new Date(due)) / 86400000);
      prefix = `${diff}日経過: `;
    }
    return { text: prefix + label, cls };
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function uniqueCategories() {
    const set = new Set();
    for (const t of todos) {
      if (t.category) set.add(t.category);
    }
    return [...set].sort((a, b) => a.localeCompare(b, 'ja'));
  }

  function renderCategoryFilters() {
    const cats = uniqueCategories();
    categoryFiltersEl.innerHTML = '';
    if (cats.length === 0) return;

    const allBtn = document.createElement('button');
    allBtn.className = 'cat-btn' + (categoryFilter === '' ? ' active' : '');
    allBtn.textContent = '全カテゴリ';
    allBtn.addEventListener('click', () => { categoryFilter = ''; render(); });
    categoryFiltersEl.appendChild(allBtn);

    for (const cat of cats) {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (categoryFilter === cat ? ' active' : '');
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = categoryColor(cat);
      btn.appendChild(dot);
      btn.appendChild(document.createTextNode(cat));
      btn.addEventListener('click', () => { categoryFilter = cat; render(); });
      categoryFiltersEl.appendChild(btn);
    }
  }

  function renderDatalist() {
    categoryListEl.innerHTML = '';
    for (const cat of uniqueCategories()) {
      const opt = document.createElement('option');
      opt.value = cat;
      categoryListEl.appendChild(opt);
    }
  }

  function render() {
    if (categoryFilter && !todos.some(t => t.category === categoryFilter)) {
      categoryFilter = '';
    }
    const filtered = todos.filter(t => {
      if (filter === 'active' && t.done) return false;
      if (filter === 'done' && !t.done) return false;
      if (categoryFilter && t.category !== categoryFilter) return false;
      return true;
    });

    renderCategoryFilters();
    renderDatalist();
    listEl.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = todos.length === 0 ? 'まだタスクがありません' : '該当するタスクがありません';
      listEl.appendChild(empty);
    } else {
      for (const todo of filtered) {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => toggle(todo.id));

        const body = document.createElement('div');
        body.className = 'body';

        const textRow = document.createElement('div');
        textRow.className = 'text-row';

        const text = document.createElement('span');
        text.className = 'text';
        text.textContent = todo.text;
        textRow.appendChild(text);

        if (todo.category) {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = todo.category;
          badge.style.background = categoryColor(todo.category);
          badge.style.cursor = 'pointer';
          badge.title = `「${todo.category}」で絞り込む`;
          badge.addEventListener('click', () => {
            categoryFilter = categoryFilter === todo.category ? '' : todo.category;
            render();
          });
          textRow.appendChild(badge);
        }

        body.appendChild(textRow);

        const dueInfo = formatDue(todo.due);
        if (dueInfo) {
          const dueLabel = document.createElement('span');
          dueLabel.className = 'due' + (dueInfo.cls ? ' ' + dueInfo.cls : '');
          dueLabel.textContent = dueInfo.text;
          body.appendChild(dueLabel);
        }

        const del = document.createElement('button');
        del.className = 'delete';
        del.textContent = '×';
        del.title = '削除';
        del.addEventListener('click', () => remove(todo.id));

        li.append(checkbox, body, del);
        listEl.appendChild(li);
      }
    }

    const remaining = todos.filter(t => !t.done).length;
    countEl.textContent = `${todos.length}件`;
    remainingEl.textContent = `残り ${remaining} 件`;
  }

  function add(text, due, category) {
    const trimmed = text.trim();
    if (!trimmed) return;
    todos.push({
      id: Date.now() + Math.random(),
      text: trimmed,
      due: due || '',
      category: (category || '').trim(),
      done: false,
    });
    save();
    render();
  }

  function toggle(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.done = !todo.done;
      save();
      render();
    }
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  formEl.addEventListener('submit', e => {
    e.preventDefault();
    add(inputEl.value, dueInputEl.value, categoryInputEl.value);
    inputEl.value = '';
    dueInputEl.value = '';
    categoryInputEl.value = '';
    inputEl.focus();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('clear-completed').addEventListener('click', () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  render();
</script>
</body>
</html>
