<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todoアプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .app {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  header {
    background: #2d3748;
    color: #fff;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  header .left { flex: 1; min-width: 0; }
  header h1 { font-size: 20px; font-weight: 600; }
  header .count { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  #user-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  #user-email {
    opacity: 0.7;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #logout {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
  }
  #logout:hover { background: rgba(255,255,255,0.1); }

  .auth-screen { padding: 32px 24px; }
  .auth-screen p {
    font-size: 14px;
    color: #4a5568;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .auth-form { display: flex; flex-direction: column; gap: 12px; }
  .auth-form input {
    padding: 12px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  .auth-form input:focus { border-color: #667eea; }
  .auth-form button {
    padding: 12px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .auth-form button:hover:not(:disabled) { background: #5a67d8; }
  .auth-form button:disabled { opacity: 0.6; cursor: not-allowed; }
  #auth-message {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
    line-height: 1.5;
  }
  #auth-message.success {
    display: block;
    background: #c6f6d5;
    color: #22543d;
  }
  #auth-message.error {
    display: block;
    background: #fed7d7;
    color: #742a2a;
  }
  .loading {
    padding: 60px 24px;
    text-align: center;
    color: #a0aec0;
    font-size: 14px;
  }

  .input-row {
    display: flex;
    flex-wrap: wrap;
    padding: 16px;
    gap: 8px;
    border-bottom: 1px solid #edf2f7;
  }
  #new-todo {
    flex: 1 1 100%;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #new-todo:focus { border-color: #667eea; }
  #new-due {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #4a5568;
    outline: none;
    transition: border-color 0.15s;
  }
  #new-due:focus { border-color: #667eea; }
  #new-category {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #4a5568;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #new-category:focus { border-color: #667eea; }
  #add-btn {
    padding: 10px 18px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  #add-btn:hover { background: #5a67d8; }
  .filters {
    display: flex;
    flex-wrap: wrap;
    padding: 12px 16px;
    gap: 8px;
    border-bottom: 1px solid #edf2f7;
  }
  .filter-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    color: #4a5568;
    cursor: pointer;
  }
  .filter-btn.active {
    background: #667eea;
    color: #fff;
    border-color: #667eea;
  }
  .category-filters {
    display: flex;
    flex-wrap: wrap;
    padding: 8px 16px 12px;
    gap: 6px;
    border-bottom: 1px solid #edf2f7;
  }
  .category-filters:empty { display: none; }
  .cat-btn {
    padding: 4px 10px;
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    font-size: 11px;
    color: #4a5568;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .cat-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .cat-btn.active {
    background: #2d3748;
    color: #fff;
    border-color: #2d3748;
  }
  ul { list-style: none; }
  li {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #f7fafc;
    gap: 12px;
  }
  li:last-child { border-bottom: none; }
  li input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #667eea;
  }
  li .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  li .text-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  li .text {
    font-size: 14px;
    color: #2d3748;
    word-break: break-word;
    cursor: text;
    border-radius: 4px;
    padding: 1px 4px;
    margin: -1px -4px;
  }
  li .text:hover { background: #f7fafc; }
  li.done .text:hover { background: transparent; }
  li .due { cursor: pointer; }
  li .due:hover { text-decoration: underline; }
  .edit-text-input {
    flex: 1;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid #667eea;
    border-radius: 4px;
    outline: none;
    font-family: inherit;
    color: #2d3748;
    background: #fff;
  }
  .edit-due-input {
    font-size: 11px;
    padding: 2px 6px;
    border: 1px solid #667eea;
    border-radius: 4px;
    outline: none;
    font-family: inherit;
    color: #4a5568;
  }
  .add-due-btn {
    font-size: 11px;
    color: #a0aec0;
    background: transparent;
    border: 1px dashed #cbd5e0;
    padding: 1px 8px;
    border-radius: 4px;
    cursor: pointer;
    align-self: flex-start;
  }
  .add-due-btn:hover { color: #667eea; border-color: #667eea; }
  li .badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  li.done .badge { opacity: 0.5; }
  li .due {
    font-size: 11px;
    color: #718096;
  }
  li .due.overdue { color: #e53e3e; font-weight: 600; }
  li .due.today { color: #d69e2e; font-weight: 600; }
  li.done .text { text-decoration: line-through; color: #a0aec0; }
  li.done .due { color: #cbd5e0; font-weight: normal; }
  li .delete {
    background: transparent;
    border: none;
    color: #cbd5e0;
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
    transition: color 0.15s;
  }
  li .delete:hover { color: #e53e3e; }
  .empty {
    padding: 40px 16px;
    text-align: center;
    color: #a0aec0;
    font-size: 14px;
  }
  .footer {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #edf2f7;
    font-size: 12px;
    color: #718096;
  }
  #clear-completed {
    background: transparent;
    border: none;
    color: #718096;
    cursor: pointer;
    font-size: 12px;
  }
  #clear-completed:hover { color: #e53e3e; }

  .view-toggle {
    display: flex;
    padding: 8px 16px;
    gap: 4px;
    border-bottom: 1px solid #edf2f7;
    background: #f7fafc;
  }
  .view-btn {
    flex: 1;
    padding: 6px 12px;
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    color: #4a5568;
    cursor: pointer;
  }
  .view-btn.active {
    background: #fff;
    border-color: #667eea;
    color: #667eea;
    font-weight: 600;
  }
  .calendar { padding: 12px 16px; }
  .calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 8px;
  }
  .calendar-header button {
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 16px;
    color: #4a5568;
    line-height: 1;
  }
  .calendar-header button:hover { background: #f7fafc; }
  .calendar-title { font-size: 14px; font-weight: 600; color: #2d3748; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: #edf2f7;
    border: 1px solid #edf2f7;
    border-radius: 6px;
    overflow: hidden;
  }
  .calendar-dow, .calendar-day { background: #fff; }
  .calendar-dow {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: #718096;
    padding: 6px 0;
  }
  .calendar-dow.sun { color: #e53e3e; }
  .calendar-dow.sat { color: #3182ce; }
  .calendar-day {
    min-height: 72px;
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
  }
  .calendar-day.other-month { background: #f7fafc; }
  .calendar-day.other-month .day-num { color: #cbd5e0; }
  .calendar-day .day-num {
    font-size: 11px;
    font-weight: 500;
    color: #4a5568;
    margin-bottom: 1px;
  }
  .calendar-day.today .day-num {
    background: #667eea;
    color: #fff;
    border-radius: 999px;
    width: 20px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  .calendar-task {
    font-size: 10px;
    padding: 1px 4px;
    border-radius: 3px;
    background: #edf2f7;
    color: #2d3748;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.4;
  }
  .calendar-task.has-cat { color: #fff; }
  .calendar-task.done { text-decoration: line-through; opacity: 0.5; }
  .calendar-task[draggable="true"] { cursor: grab; }
  .calendar-task[draggable="true"]:active { cursor: grabbing; }
  .calendar-task.dragging { opacity: 0.4; }
  .calendar-day.drag-over {
    background: #ebf4ff;
    outline: 2px solid #667eea;
    outline-offset: -2px;
  }

  .stats { padding: 16px; }
  .year-switcher {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .year-switcher button {
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 14px;
    color: #4a5568;
    line-height: 1;
  }
  .year-switcher button:hover:not(:disabled) { background: #f7fafc; }
  .year-switcher button:disabled { opacity: 0.3; cursor: not-allowed; }
  .year-label {
    font-size: 15px;
    font-weight: 600;
    color: #2d3748;
    min-width: 110px;
    text-align: center;
  }
  .stats-section {
    margin-bottom: 14px;
    border: 1px solid #edf2f7;
    border-radius: 8px;
    padding: 14px;
  }
  .stats-section h3 {
    font-size: 12px;
    font-weight: 600;
    color: #718096;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .summary-row {
    display: flex;
    justify-content: space-around;
    text-align: center;
    gap: 8px;
  }
  .summary-row .item { flex: 1; }
  .summary-row .num {
    font-size: 22px;
    font-weight: 700;
    color: #2d3748;
    line-height: 1.2;
  }
  .summary-row .num.warn { color: #e53e3e; }
  .summary-row .num.ok { color: #38a169; }
  .summary-row .lbl {
    font-size: 11px;
    color: #718096;
    margin-top: 2px;
  }
  .stats-bar {
    background: #edf2f7;
    border-radius: 999px;
    overflow: hidden;
    height: 6px;
    margin-top: 12px;
  }
  .stats-bar .fill {
    height: 100%;
    background: #48bb78;
    transition: width 0.3s;
  }
  .stats-bar-label {
    text-align: center;
    font-size: 11px;
    color: #718096;
    margin-top: 6px;
  }
  .stats-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 13px;
    color: #2d3748;
    gap: 8px;
  }
  .stats-row + .stats-row { border-top: 1px solid #f7fafc; }
  .stats-row .label {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    flex: 1;
  }
  .stats-row .label .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stats-row .label .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .stats-row .value {
    color: #4a5568;
    font-size: 12px;
    flex-shrink: 0;
  }
  .stats-row .value .pct { color: #a0aec0; margin-left: 6px; }
  .stats-empty {
    padding: 24px;
    text-align: center;
    color: #a0aec0;
    font-size: 13px;
  }
  .calendar-task.overdue:not(.has-cat):not(.done) {
    background: #fed7d7;
    color: #742a2a;
  }
  .calendar-more {
    font-size: 9px;
    color: #a0aec0;
    text-align: center;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="left">
        <h1>Todoアプリ</h1>
        <div class="count" id="count">0件</div>
      </div>
      <div id="user-bar" hidden>
        <span id="user-email"></span>
        <button id="logout">ログアウト</button>
      </div>
    </header>

    <div class="loading" id="loading">読み込み中…</div>

    <div class="auth-screen" id="auth-screen" hidden>
      <p>メールアドレスを入力すると、ログイン用のリンクをお送りします。リンクをクリックするとログイン完了です。</p>
      <form class="auth-form" id="auth-form">
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        <button type="submit" id="auth-btn">マジックリンクを送信</button>
      </form>
      <div id="auth-message"></div>
    </div>

    <div id="todo-screen" hidden>
      <form class="input-row" id="form">
        <input type="text" id="new-todo" placeholder="やることを入力…" autocomplete="off">
        <input type="date" id="new-due" title="期限（任意）">
        <input type="text" id="new-category" placeholder="カテゴリ（任意）" list="category-list" autocomplete="off">
        <datalist id="category-list"></datalist>
        <button type="submit" id="add-btn">追加</button>
      </form>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="active">未完了</button>
        <button class="filter-btn" data-filter="done">完了</button>
      </div>
      <div class="category-filters" id="category-filters"></div>
      <div class="view-toggle">
        <button class="view-btn active" data-view="list">リスト</button>
        <button class="view-btn" data-view="calendar">カレンダー</button>
        <button class="view-btn" data-view="stats">統計</button>
      </div>
      <div id="list-view">
        <ul id="list"></ul>
      </div>
      <div id="calendar-view" hidden>
        <div class="calendar">
          <div class="calendar-header">
            <button id="cal-prev" title="前月">‹</button>
            <span class="calendar-title" id="cal-title"></span>
            <button id="cal-next" title="次月">›</button>
          </div>
          <div class="calendar-grid" id="cal-grid"></div>
        </div>
      </div>
      <div id="stats-view" hidden>
        <div class="stats">
          <div class="year-switcher">
            <button id="year-prev" title="前年度">‹</button>
            <span class="year-label" id="year-label"></span>
            <button id="year-next" title="次年度">›</button>
          </div>
          <div id="stats-content"></div>
        </div>
      </div>
      <div class="footer">
        <span id="remaining">残り 0 件</span>
        <button id="clear-completed">完了済みを削除</button>
      </div>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://wbxqnmmczhrbpugbkejz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_accgIXrCeI803EgukIJjjg_21KvYBCB';
  const LEGACY_KEY = 'todo-app-items';

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  let todos = [];
  let filter = 'all';
  let categoryFilter = '';
  let view = 'list';
  let calendarMonth = (() => { const d = new Date(); d.setDate(1); return d; })();
  let statsYear = null;
  let realtimeChannel = null;

  const loadingEl = document.getElementById('loading');
  const authScreenEl = document.getElementById('auth-screen');
  const todoScreenEl = document.getElementById('todo-screen');
  const userBarEl = document.getElementById('user-bar');
  const userEmailEl = document.getElementById('user-email');
  const authFormEl = document.getElementById('auth-form');
  const emailEl = document.getElementById('email');
  const authBtnEl = document.getElementById('auth-btn');
  const authMessageEl = document.getElementById('auth-message');

  const listEl = document.getElementById('list');
  const listViewEl = document.getElementById('list-view');
  const calendarViewEl = document.getElementById('calendar-view');
  const statsViewEl = document.getElementById('stats-view');
  const statsContentEl = document.getElementById('stats-content');
  const yearLabelEl = document.getElementById('year-label');
  const filtersEl = document.querySelector('.filters');
  const calGridEl = document.getElementById('cal-grid');
  const calTitleEl = document.getElementById('cal-title');
  const formEl = document.getElementById('form');
  const inputEl = document.getElementById('new-todo');
  const dueInputEl = document.getElementById('new-due');
  const categoryInputEl = document.getElementById('new-category');
  const categoryListEl = document.getElementById('category-list');
  const categoryFiltersEl = document.getElementById('category-filters');
  const countEl = document.getElementById('count');
  const remainingEl = document.getElementById('remaining');

  function categoryColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) {
      h = (h * 31 + name.charCodeAt(i)) >>> 0;
    }
    return `hsl(${h % 360}, 65%, 45%)`;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  function formatDue(due) {
    if (!due) return null;
    const today = todayStr();
    const [, m, d] = due.split('-');
    const label = `${parseInt(m, 10)}/${parseInt(d, 10)}`;
    let cls = '';
    let prefix = '期限: ';
    if (due === today) { cls = 'today'; prefix = '今日: '; }
    else if (due < today) {
      cls = 'overdue';
      const diff = Math.floor((new Date(today) - new Date(due)) / 86400000);
      prefix = `${diff}日経過: `;
    }
    return { text: prefix + label, cls };
  }

  function uniqueCategories() {
    const set = new Set();
    for (const t of todos) if (t.category) set.add(t.category);
    return [...set].sort((a, b) => a.localeCompare(b, 'ja'));
  }

  function renderCategoryFilters() {
    const cats = uniqueCategories();
    categoryFiltersEl.innerHTML = '';
    if (cats.length === 0) return;

    const allBtn = document.createElement('button');
    allBtn.className = 'cat-btn' + (categoryFilter === '' ? ' active' : '');
    allBtn.textContent = '全カテゴリ';
    allBtn.addEventListener('click', () => { categoryFilter = ''; render(); });
    categoryFiltersEl.appendChild(allBtn);

    for (const cat of cats) {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (categoryFilter === cat ? ' active' : '');
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = categoryColor(cat);
      btn.appendChild(dot);
      btn.appendChild(document.createTextNode(cat));
      btn.addEventListener('click', () => { categoryFilter = cat; render(); });
      categoryFiltersEl.appendChild(btn);
    }
  }

  function renderDatalist() {
    categoryListEl.innerHTML = '';
    for (const cat of uniqueCategories()) {
      const opt = document.createElement('option');
      opt.value = cat;
      categoryListEl.appendChild(opt);
    }
  }

  function applyFilters(arr) {
    return arr.filter(t => {
      if (filter === 'active' && t.done) return false;
      if (filter === 'done' && !t.done) return false;
      if (categoryFilter && t.category !== categoryFilter) return false;
      return true;
    });
  }

  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  function renderCalendar() {
    const year = calendarMonth.getFullYear();
    const month = calendarMonth.getMonth();
    calTitleEl.textContent = `${year}年${month + 1}月`;

    const startDay = new Date(year, month, 1).getDay();
    const start = new Date(year, month, 1 - startDay);
    const today = todayStr();
    const filtered = applyFilters(todos);

    calGridEl.innerHTML = '';
    const dows = ['日', '月', '火', '水', '木', '金', '土'];
    for (let i = 0; i < 7; i++) {
      const d = document.createElement('div');
      d.className = 'calendar-dow' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
      d.textContent = dows[i];
      calGridEl.appendChild(d);
    }

    for (let i = 0; i < 42; i++) {
      const date = new Date(start);
      date.setDate(start.getDate() + i);
      const ds = dateKey(date);

      const cell = document.createElement('div');
      cell.className = 'calendar-day';
      cell.dataset.date = ds;
      if (date.getMonth() !== month) cell.classList.add('other-month');
      if (ds === today) cell.classList.add('today');

      cell.addEventListener('dragover', e => {
        if (!e.dataTransfer.types.includes('application/x-todo-id')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        cell.classList.add('drag-over');
      });
      cell.addEventListener('dragleave', e => {
        if (e.relatedTarget && cell.contains(e.relatedTarget)) return;
        cell.classList.remove('drag-over');
      });
      cell.addEventListener('drop', e => {
        e.preventDefault();
        cell.classList.remove('drag-over');
        const id = e.dataTransfer.getData('application/x-todo-id');
        if (!id) return;
        const todo = todos.find(t => String(t.id) === id);
        if (!todo || todo.due === ds) return;
        updateField(todo.id, { due: ds });
      });

      const num = document.createElement('span');
      num.className = 'day-num';
      num.textContent = date.getDate();
      cell.appendChild(num);

      const dayTasks = filtered.filter(t => t.due === ds);
      const maxShow = 3;
      for (let j = 0; j < Math.min(maxShow, dayTasks.length); j++) {
        const t = dayTasks[j];
        const chip = document.createElement('div');
        chip.className = 'calendar-task';
        if (t.done) chip.classList.add('done');
        if (ds < today && !t.done) chip.classList.add('overdue');
        if (t.category) {
          chip.classList.add('has-cat');
          chip.style.background = categoryColor(t.category);
        }
        chip.textContent = t.text;
        chip.title = (t.category ? `[${t.category}] ` : '') + t.text + '（クリックで完了/未完了、ドラッグで日付変更）';

        chip.draggable = true;
        chip.addEventListener('dragstart', e => {
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('application/x-todo-id', String(t.id));
          chip.classList.add('dragging');
        });
        chip.addEventListener('dragend', () => {
          chip.classList.remove('dragging');
          calGridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        });

        chip.addEventListener('click', () => toggle(t.id));
        cell.appendChild(chip);
      }
      if (dayTasks.length > maxShow) {
        const more = document.createElement('div');
        more.className = 'calendar-more';
        more.textContent = `+${dayTasks.length - maxShow} 件`;
        cell.appendChild(more);
      }

      calGridEl.appendChild(cell);
    }
  }

  function fiscalYearOf(dateStrOrDate) {
    const d = typeof dateStrOrDate === 'string' ? new Date(dateStrOrDate) : dateStrOrDate;
    return d.getMonth() < 3 ? d.getFullYear() - 1 : d.getFullYear();
  }

  function inFiscalYear(dateStr, year) {
    if (!dateStr) return false;
    const ds = dateStr.slice(0, 10);
    return ds >= `${year}-04-01` && ds < `${year + 1}-04-01`;
  }

  function availableFiscalYears() {
    const years = new Set();
    for (const t of todos) {
      if (t.created_at) years.add(fiscalYearOf(t.created_at));
    }
    years.add(fiscalYearOf(new Date()));
    return [...years].sort((a, b) => a - b);
  }

  function renderStats() {
    if (statsYear === null) statsYear = fiscalYearOf(new Date());
    const years = availableFiscalYears();
    const minY = years[0];
    const maxY = years[years.length - 1];

    yearLabelEl.textContent = `${statsYear}年度`;
    document.getElementById('year-prev').disabled = statsYear <= minY;
    document.getElementById('year-next').disabled = statsYear >= maxY;

    const yearTodos = todos.filter(t => inFiscalYear(t.created_at, statsYear));

    statsContentEl.innerHTML = '';

    if (yearTodos.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'stats-empty';
      empty.textContent = `${statsYear}年度に登録されたタスクはありません`;
      statsContentEl.appendChild(empty);
      return;
    }

    const total = yearTodos.length;
    const done = yearTodos.filter(t => t.done).length;
    const active = total - done;
    const rate = total ? (done / total * 100) : 0;

    const sec1 = document.createElement('div');
    sec1.className = 'stats-section';
    sec1.innerHTML = `
      <h3>登録状況</h3>
      <div class="summary-row">
        <div class="item"><div class="num">${total}</div><div class="lbl">登録</div></div>
        <div class="item"><div class="num ok">${done}</div><div class="lbl">完了</div></div>
        <div class="item"><div class="num">${active}</div><div class="lbl">未完了</div></div>
      </div>
      <div class="stats-bar"><div class="fill" style="width:${rate}%"></div></div>
      <div class="stats-bar-label">完了率 ${rate.toFixed(1)}%</div>
    `;
    statsContentEl.appendChild(sec1);

    const byCat = new Map();
    for (const t of yearTodos) {
      const key = t.category || '';
      if (!byCat.has(key)) byCat.set(key, { total: 0, done: 0 });
      const v = byCat.get(key);
      v.total++;
      if (t.done) v.done++;
    }
    const sortedCats = [...byCat.entries()].sort((a, b) => b[1].total - a[1].total);

    const sec2 = document.createElement('div');
    sec2.className = 'stats-section';
    const h2 = document.createElement('h3');
    h2.textContent = '分類ごとの統計';
    sec2.appendChild(h2);
    for (const [cat, v] of sortedCats) {
      const row = document.createElement('div');
      row.className = 'stats-row';
      const label = document.createElement('span');
      label.className = 'label';
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = cat ? categoryColor(cat) : '#cbd5e0';
      label.appendChild(dot);
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = cat || '(未分類)';
      label.appendChild(name);
      const value = document.createElement('span');
      value.className = 'value';
      const pct = v.total ? (v.done / v.total * 100).toFixed(0) : 0;
      value.innerHTML = `${v.total}件 (完了 ${v.done})<span class="pct">${pct}%</span>`;
      row.append(label, value);
      sec2.appendChild(row);
    }
    statsContentEl.appendChild(sec2);

    const today = todayStr();
    const overdue = yearTodos.filter(t => t.due && t.due < today && !t.done);
    const buckets = { '1〜7日遅れ': 0, '8〜30日遅れ': 0, '31日以上': 0 };
    for (const t of overdue) {
      const days = Math.floor((new Date(today) - new Date(t.due)) / 86400000);
      if (days <= 7) buckets['1〜7日遅れ']++;
      else if (days <= 30) buckets['8〜30日遅れ']++;
      else buckets['31日以上']++;
    }
    const noDue = yearTodos.filter(t => !t.due && !t.done).length;

    const sec3 = document.createElement('div');
    sec3.className = 'stats-section';
    const h3el = document.createElement('h3');
    h3el.textContent = '進捗遅れ';
    sec3.appendChild(h3el);

    const summary = document.createElement('div');
    summary.className = 'summary-row';
    summary.innerHTML = `
      <div class="item"><div class="num ${overdue.length ? 'warn' : ''}">${overdue.length}</div><div class="lbl">期限切れ</div></div>
      <div class="item"><div class="num">${noDue}</div><div class="lbl">期限未設定</div></div>
    `;
    sec3.appendChild(summary);

    if (overdue.length > 0) {
      for (const [k, v] of Object.entries(buckets)) {
        if (v === 0) continue;
        const row = document.createElement('div');
        row.className = 'stats-row';
        row.innerHTML = `<span class="label"><span class="name">${k}</span></span><span class="value">${v}件</span>`;
        sec3.appendChild(row);
      }
    }
    statsContentEl.appendChild(sec3);
  }

  function render() {
    if (categoryFilter && !todos.some(t => t.category === categoryFilter)) {
      categoryFilter = '';
    }
    const filtered = applyFilters(todos);

    renderCategoryFilters();
    renderDatalist();

    if (view === 'calendar') {
      renderCalendar();
    } else if (view === 'stats') {
      renderStats();
    }

    listEl.innerHTML = '';

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = todos.length === 0 ? 'まだタスクがありません' : '該当するタスクがありません';
      listEl.appendChild(empty);
    } else {
      for (const todo of filtered) {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => toggle(todo.id));

        const body = document.createElement('div');
        body.className = 'body';

        const textRow = document.createElement('div');
        textRow.className = 'text-row';

        const text = document.createElement('span');
        text.className = 'text';
        text.textContent = todo.text;
        text.title = 'クリックで編集';
        text.addEventListener('click', () => editText(todo, text));
        textRow.appendChild(text);

        if (todo.category) {
          const badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = todo.category;
          badge.style.background = categoryColor(todo.category);
          badge.style.cursor = 'pointer';
          badge.title = `「${todo.category}」で絞り込む`;
          badge.addEventListener('click', () => {
            categoryFilter = categoryFilter === todo.category ? '' : todo.category;
            render();
          });
          textRow.appendChild(badge);
        }

        body.appendChild(textRow);

        const dueInfo = formatDue(todo.due);
        if (dueInfo) {
          const dueLabel = document.createElement('span');
          dueLabel.className = 'due' + (dueInfo.cls ? ' ' + dueInfo.cls : '');
          dueLabel.textContent = dueInfo.text;
          dueLabel.title = 'クリックで期限を変更';
          dueLabel.addEventListener('click', () => editDue(todo, dueLabel));
          body.appendChild(dueLabel);
        } else {
          const addDue = document.createElement('button');
          addDue.type = 'button';
          addDue.className = 'add-due-btn';
          addDue.textContent = '+ 期限';
          addDue.addEventListener('click', () => editDue(todo, addDue));
          body.appendChild(addDue);
        }

        const del = document.createElement('button');
        del.className = 'delete';
        del.textContent = '×';
        del.title = '削除';
        del.addEventListener('click', () => remove(todo.id));

        li.append(checkbox, body, del);
        listEl.appendChild(li);
      }
    }

    const remaining = todos.filter(t => !t.done).length;
    countEl.textContent = `${todos.length}件`;
    remainingEl.textContent = `残り ${remaining} 件`;
  }

  async function loadTodos() {
    const { data, error } = await supabase
      .from('todos')
      .select('*')
      .order('created_at', { ascending: true });
    if (error) {
      console.error('読み込み失敗:', error);
      return;
    }
    todos = data || [];
    render();
  }

  async function add(text, due, category) {
    const trimmed = text.trim();
    if (!trimmed) return;
    const row = {
      text: trimmed,
      due: due || null,
      category: (category || '').trim() || null,
      done: false,
    };
    const { data, error } = await supabase.from('todos').insert(row).select().single();
    if (error) {
      console.error('追加失敗:', error);
      alert('追加に失敗しました: ' + error.message);
      return;
    }
    todos.push(data);
    render();
  }

  async function toggle(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const newDone = !todo.done;
    todo.done = newDone;
    render();
    const { error } = await supabase.from('todos').update({ done: newDone }).eq('id', id);
    if (error) {
      console.error('更新失敗:', error);
      todo.done = !newDone;
      render();
    }
  }

  function editText(todo, textEl) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-text-input';
    input.value = todo.text;
    textEl.replaceWith(input);
    input.focus();
    input.select();

    let finished = false;
    const finish = (save) => {
      if (finished) return;
      finished = true;
      if (save) {
        const newText = input.value.trim();
        if (newText && newText !== todo.text) {
          updateField(todo.id, { text: newText });
          return;
        }
      }
      render();
    };

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); finish(true); }
      else if (e.key === 'Escape') { finish(false); }
    });
    input.addEventListener('blur', () => finish(true));
  }

  function editDue(todo, anchorEl) {
    const input = document.createElement('input');
    input.type = 'date';
    input.className = 'edit-due-input';
    input.value = todo.due || '';
    anchorEl.replaceWith(input);
    input.focus();
    if (input.showPicker) {
      try { input.showPicker(); } catch {}
    }

    let finished = false;
    const finish = (save) => {
      if (finished) return;
      finished = true;
      if (save) {
        const newDue = input.value || null;
        if (newDue !== (todo.due || null)) {
          updateField(todo.id, { due: newDue });
          return;
        }
      }
      render();
    };

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); finish(true); }
      else if (e.key === 'Escape') { finish(false); }
    });
    input.addEventListener('change', () => finish(true));
    input.addEventListener('blur', () => finish(true));
  }

  async function updateField(id, fields) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const before = {};
    for (const k of Object.keys(fields)) before[k] = todo[k];
    Object.assign(todo, fields);
    render();
    const { error } = await supabase.from('todos').update(fields).eq('id', id);
    if (error) {
      console.error('更新失敗:', error);
      Object.assign(todo, before);
      render();
      alert('更新に失敗しました: ' + error.message);
    }
  }

  async function remove(id) {
    const prev = todos;
    todos = todos.filter(t => t.id !== id);
    render();
    const { error } = await supabase.from('todos').delete().eq('id', id);
    if (error) {
      console.error('削除失敗:', error);
      todos = prev;
      render();
    }
  }

  async function clearCompleted() {
    const completedIds = todos.filter(t => t.done).map(t => t.id);
    if (completedIds.length === 0) return;
    const prev = todos;
    todos = todos.filter(t => !t.done);
    render();
    const { error } = await supabase.from('todos').delete().in('id', completedIds);
    if (error) {
      console.error('削除失敗:', error);
      todos = prev;
      render();
    }
  }

  async function migrateLocalStorageIfNeeded() {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (!raw) return;
    let local;
    try { local = JSON.parse(raw); } catch { return; }
    if (!Array.isArray(local) || local.length === 0) {
      localStorage.removeItem(LEGACY_KEY);
      return;
    }
    const rows = local.map(t => ({
      text: t.text,
      due: t.due || null,
      category: (t.category || '').trim() || null,
      done: !!t.done,
    }));
    const { error } = await supabase.from('todos').insert(rows);
    if (!error) {
      localStorage.removeItem(LEGACY_KEY);
    } else {
      console.error('移行失敗:', error);
    }
  }

  function showScreen(screen) {
    loadingEl.hidden = screen !== 'loading';
    authScreenEl.hidden = screen !== 'auth';
    todoScreenEl.hidden = screen !== 'todo';
    userBarEl.hidden = screen !== 'todo';
  }

  async function enterAppForUser(user) {
    userEmailEl.textContent = user.email || '';
    showScreen('todo');
    await migrateLocalStorageIfNeeded();
    await loadTodos();

    if (realtimeChannel) {
      await supabase.removeChannel(realtimeChannel);
    }
    realtimeChannel = supabase
      .channel('todos-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'todos' }, () => {
        loadTodos();
      })
      .subscribe();
  }

  async function exitApp() {
    if (realtimeChannel) {
      await supabase.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
    todos = [];
    showScreen('auth');
  }

  formEl.addEventListener('submit', e => {
    e.preventDefault();
    add(inputEl.value, dueInputEl.value, categoryInputEl.value);
    inputEl.value = '';
    dueInputEl.value = '';
    categoryInputEl.value = '';
    inputEl.focus();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      view = btn.dataset.view;
      listViewEl.hidden = view !== 'list';
      calendarViewEl.hidden = view !== 'calendar';
      statsViewEl.hidden = view !== 'stats';
      filtersEl.hidden = view === 'stats';
      categoryFiltersEl.style.display = view === 'stats' ? 'none' : '';
      render();
    });
  });

  document.getElementById('cal-prev').addEventListener('click', () => {
    calendarMonth.setMonth(calendarMonth.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', () => {
    calendarMonth.setMonth(calendarMonth.getMonth() + 1);
    renderCalendar();
  });

  document.getElementById('year-prev').addEventListener('click', () => {
    if (statsYear === null) statsYear = fiscalYearOf(new Date());
    statsYear--;
    renderStats();
  });
  document.getElementById('year-next').addEventListener('click', () => {
    if (statsYear === null) statsYear = fiscalYearOf(new Date());
    statsYear++;
    renderStats();
  });

  document.getElementById('clear-completed').addEventListener('click', clearCompleted);

  authFormEl.addEventListener('submit', async e => {
    e.preventDefault();
    const email = emailEl.value.trim();
    if (!email) return;
    authBtnEl.disabled = true;
    authBtnEl.textContent = '送信中…';
    authMessageEl.className = '';
    authMessageEl.textContent = '';

    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href.split('#')[0].split('?')[0] },
    });

    authBtnEl.disabled = false;
    authBtnEl.textContent = 'マジックリンクを送信';

    if (error) {
      authMessageEl.className = 'error';
      authMessageEl.textContent = '送信失敗: ' + error.message;
    } else {
      authMessageEl.className = 'success';
      authMessageEl.textContent = `${email} にログイン用のリンクを送信しました。メールを確認してください。`;
    }
  });

  document.getElementById('logout').addEventListener('click', async () => {
    await supabase.auth.signOut();
  });

  supabase.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
      enterAppForUser(session.user);
    } else {
      exitApp();
    }
  });

  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) {
      enterAppForUser(session.user);
    } else {
      showScreen('auth');
    }
  })();
</script>
</body>
</html>
