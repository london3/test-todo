<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todoアプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .app {
    background: #fff;
    width: 100%;
    max-width: 480px;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  header {
    background: #2d3748;
    color: #fff;
    padding: 20px 24px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header .count { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .input-row {
    display: flex;
    flex-wrap: wrap;
    padding: 16px;
    gap: 8px;
    border-bottom: 1px solid #edf2f7;
  }
  #new-todo {
    flex: 1 1 100%;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #new-todo:focus { border-color: #667eea; }
  #new-due {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
    color: #4a5568;
    outline: none;
    transition: border-color 0.15s;
  }
  #new-due:focus { border-color: #667eea; }
  #add-btn {
    padding: 10px 18px;
    background: #667eea;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  #add-btn:hover { background: #5a67d8; }
  .filters {
    display: flex;
    padding: 12px 16px;
    gap: 8px;
    border-bottom: 1px solid #edf2f7;
  }
  .filter-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    color: #4a5568;
    cursor: pointer;
  }
  .filter-btn.active {
    background: #667eea;
    color: #fff;
    border-color: #667eea;
  }
  ul { list-style: none; }
  li {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #f7fafc;
    gap: 12px;
  }
  li:last-child { border-bottom: none; }
  li input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #667eea;
  }
  li .body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  li .text {
    font-size: 14px;
    color: #2d3748;
    word-break: break-word;
  }
  li .due {
    font-size: 11px;
    color: #718096;
  }
  li .due.overdue {
    color: #e53e3e;
    font-weight: 600;
  }
  li .due.today {
    color: #d69e2e;
    font-weight: 600;
  }
  li.done .text {
    text-decoration: line-through;
    color: #a0aec0;
  }
  li.done .due { color: #cbd5e0; font-weight: normal; }
  li .delete {
    background: transparent;
    border: none;
    color: #cbd5e0;
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
    transition: color 0.15s;
  }
  li .delete:hover { color: #e53e3e; }
  .empty {
    padding: 40px 16px;
    text-align: center;
    color: #a0aec0;
    font-size: 14px;
  }
  .footer {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #edf2f7;
    font-size: 12px;
    color: #718096;
  }
  #clear-completed {
    background: transparent;
    border: none;
    color: #718096;
    cursor: pointer;
    font-size: 12px;
  }
  #clear-completed:hover { color: #e53e3e; }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Todoアプリ</h1>
      <div class="count" id="count">0件</div>
    </header>
    <form class="input-row" id="form">
      <input type="text" id="new-todo" placeholder="やることを入力…" autocomplete="off" autofocus>
      <input type="date" id="new-due" title="期限（任意）">
      <button type="submit" id="add-btn">追加</button>
    </form>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="done">完了</button>
    </div>
    <ul id="list"></ul>
    <div class="footer">
      <span id="remaining">残り 0 件</span>
      <button id="clear-completed">完了済みを削除</button>
    </div>
  </div>

<script>
  const STORAGE_KEY = 'todo-app-items';
  let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let filter = 'all';

  const listEl = document.getElementById('list');
  const formEl = document.getElementById('form');
  const inputEl = document.getElementById('new-todo');
  const dueEl = document.getElementById('new-due');
  const countEl = document.getElementById('count');
  const remainingEl = document.getElementById('remaining');

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function formatDue(due) {
    if (!due) return null;
    const today = todayStr();
    const [y, m, d] = due.split('-');
    const label = `${parseInt(m, 10)}/${parseInt(d, 10)}`;
    let cls = '';
    if (due < today) cls = 'overdue';
    else if (due === today) cls = 'today';
    let prefix = '期限: ';
    if (due === today) prefix = '今日: ';
    else if (due < today) {
      const diff = Math.floor((new Date(today) - new Date(due)) / 86400000);
      prefix = `${diff}日経過: `;
    }
    return { text: prefix + label, cls };
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function render() {
    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    listEl.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = todos.length === 0 ? 'まだタスクがありません' : '該当するタスクがありません';
      listEl.appendChild(empty);
    } else {
      for (const todo of filtered) {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = todo.done;
        checkbox.addEventListener('change', () => toggle(todo.id));

        const body = document.createElement('div');
        body.className = 'body';

        const text = document.createElement('span');
        text.className = 'text';
        text.textContent = todo.text;
        body.appendChild(text);

        const dueInfo = formatDue(todo.due);
        if (dueInfo) {
          const dueEl = document.createElement('span');
          dueEl.className = 'due' + (dueInfo.cls ? ' ' + dueInfo.cls : '');
          dueEl.textContent = dueInfo.text;
          body.appendChild(dueEl);
        }

        const del = document.createElement('button');
        del.className = 'delete';
        del.textContent = '×';
        del.title = '削除';
        del.addEventListener('click', () => remove(todo.id));

        li.append(checkbox, body, del);
        listEl.appendChild(li);
      }
    }

    const remaining = todos.filter(t => !t.done).length;
    countEl.textContent = `${todos.length}件`;
    remainingEl.textContent = `残り ${remaining} 件`;
  }

  function add(text, due) {
    const trimmed = text.trim();
    if (!trimmed) return;
    todos.push({ id: Date.now() + Math.random(), text: trimmed, due: due || '', done: false });
    save();
    render();
  }

  function toggle(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.done = !todo.done;
      save();
      render();
    }
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  formEl.addEventListener('submit', e => {
    e.preventDefault();
    add(inputEl.value, dueEl.value);
    inputEl.value = '';
    dueEl.value = '';
    inputEl.focus();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('clear-completed').addEventListener('click', () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  render();
</script>
</body>
</html>
